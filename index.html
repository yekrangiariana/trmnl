<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BRIEF</title>
  <meta name="description" content="BRIEF is a simple information display for browser-enabled screens. It shows the information you want to see in a clear layout that can remain visible throughout the day. Calendars, tasks, weather, news, metrics and custom content can all be displayed in one place. BRIEF is designed for screens that stay on and stay in view. It works in any modern browser and can be used on monitors, tablets, televisions and other connected displays.">
  
  <!-- PWA Manifest & App Icons -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  
  <!-- iOS Standalone Web App Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BRIEF">
  
  <!-- Preconnect and Load Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,500&family=Pixelify+Sans:wght@700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="themes/eink-white.css">
  <link rel="stylesheet" href="themes/eink-dark.css">
  <link rel="stylesheet" href="themes/warm.css">
  <link rel="stylesheet" href="themes/navy.css">
  <link rel="stylesheet" href="themes/programmer.css">
</head>
<body>

  <!-- Scale-to-fit Screen Container -->
  <div id="app-viewport">
    
    <!-- E-Paper Flash Transition Overlay -->
    <div id="flash-overlay"></div>

    <!-- Floating Settings Toggle Button -->
    <button id="settings-toggle-btn" title="Toggle Settings">
      <svg style="width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5;" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>

    <!-- Page Touch Zones for Manual Navigation -->
    <div class="page-control-zone left" id="nav-prev" title="Previous Page">
      <span class="page-control-arrow">&larr;</span>
    </div>
    <div class="page-control-zone right" id="nav-next" title="Next Page">
      <span class="page-control-arrow">&rarr;</span>
    </div>

    <!-- Dynamic Plugin Content Area -->
    <main id="plugin-container">
      <!-- Plugin views will be rendered here dynamically -->
    </main>


    <!-- Quick Page Switcher Overlay -->
    <div id="quick-switcher" class="quick-switcher-overlay">
      <div class="quick-switcher-content"></div>
    </div>

  </div>

  <!-- Load Configurations -->
  <script src="config.js"></script>

  <!-- Load SVG Icons -->
  <script src="plugins/icons.js"></script>

  <!-- Load Plugins -->
  <script src="plugins/time.js"></script>
  <script src="plugins/today_in_history.js"></script>
  <script src="plugins/life_in_weeks.js"></script>
  <script src="plugins/weather.js"></script>
  <script src="plugins/sunrise_sunset.js"></script>
  <script src="plugins/word_of_the_day.js"></script>
  <script src="plugins/finnish_idioms.js"></script>
  <script src="plugins/guest_wifi.js"></script>
  <script src="plugins/news_headlines.js"></script>
  <script src="plugins/todoist.js"></script>
  <script src="plugins/random_wikipedia.js"></script>
  <script src="plugins/nasa_space_photo.js"></script>
  <script src="plugins/laundry_cost.js"></script>
  <script src="plugins/hsl_departures.js"></script>
  <script src="plugins/personal_stats.js"></script>
  <script src="plugins/settings.js"></script>

  <!-- Load Orchestrator -->
  <script src="app.js"></script>

  <!-- Register PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js')
          .then(function(reg) {
            console.log('PWA Service Worker registered on scope:', reg.scope);
          })
          .catch(function(err) {
            console.warn('PWA Service Worker registration failed:', err);
          });
      });
    }
  </script>
</body>
</html>
